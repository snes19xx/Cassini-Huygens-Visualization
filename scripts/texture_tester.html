<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texture Resolution & Compression Tester</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #050505;
        color: white;
        font-family: sans-serif;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(20, 20, 20, 0.8);
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #333;
        z-index: 10;
        max-width: 300px;
      }
      input[type="file"] {
        margin-top: 10px;
        margin-bottom: 10px;
        display: block;
        width: 100%;
      }
      .stats {
        font-size: 12px;
        color: #aaa;
        margin-top: 10px;
        margin-bottom: 15px;
      }
      h3 {
        margin-top: 0;
        font-size: 16px;
      }
      button {
        margin-top: 5px;
        width: 100%;
        padding: 8px;
        background: #333;
        color: white;
        border: 1px solid #555;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #444;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="ui">
      <h3>Texture Tester</h3>
      <label for="fileInput">Load JPG, PNG, WebP, or KTX2:</label>
      <input
        type="file"
        id="fileInput"
        accept="image/jpeg, image/png, image/webp, .ktx2"
      />
      <div class="stats" id="fileStats">No texture loaded.</div>
      <button id="btnToggleHemisphere">Toggle Light Hemisphere</button>
      <button id="btnLightAllSides">Toggle Light All Sides</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
